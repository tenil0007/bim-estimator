# Render Blueprint (Infrastructure as Code)
# Documentation: https://render.com/docs/blueprint-spec

services:
  # ─── Backend Service ───────────────────────────────────────────
  - type: web
    name: bim-backend
    env: python
    plan: free # Force Render to use the completely free instance tier
    rootDir: bim-cost-estimator
    region: singapore # Change based on your target users
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: "BIM Cost & Time Estimator"
      - key: DEBUG
        value: true
      - key: BACKEND_CORS_ORIGINS
        value: "*" # Allow frontend to connect (you can restrict this to the frontend URL later for prod)
      # DATABASE_URL is set as a secret in Render dashboard (Supabase PostgreSQL)


  # ─── Frontend Service ──────────────────────────────────────────
  - type: web
    name: bim-frontend
    env: static
    rootDir: bim-cost-estimator
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: 20
      # VITE_API_BASE_URL must be the full URL including protocol and API path.
      # 'hostURL' gives https://bim-backend.onrender.com — we append /api/v1
      - key: VITE_API_BASE_URL
        value: "https://bim-backend-0nr0.onrender.com/api/v1"
